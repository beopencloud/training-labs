name: CI - Test, Build & Push

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # récupère votre code
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flask pytest
      - run: pytest test_app.py -v       # lance les tests

  build-push:
    runs-on: ubuntu-latest
    needs: test                          # attend que les tests soient verts
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3     # connexion à Docker Hub
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5   # build + push de l'image
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest
