# Inventaire Ansible — Module 07
# FR : En local, utiliser localhost. Pour des serveurs distants, remplacer par l'IP/hostname
# EN : Locally, use localhost. For remote servers, replace with IP/hostname

[app_servers]
localhost ansible_connection=local

[staging:children]
app_servers

[production]
# prod-server ansible_host=IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
