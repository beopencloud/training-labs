[flake8]
max-line-length = 120
exclude = .git,__pycache__,.venv
ignore = E501,W503

[tool:pytest]
testpaths = .
python_files = test_*.py
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

[coverage:run]
source = app
omit = test_*.py

[coverage:report]
fail_under = 80
show_missing = True
